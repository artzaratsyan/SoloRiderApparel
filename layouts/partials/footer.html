<footer class="site-footer">
  <p>{{ .Site.Params.brand }} · {{ now.Format "2006" }}</p>
  {{ if .Site.Params.instagram }}
  <a href="{{ .Site.Params.instagram }}" target="_blank" rel="noopener noreferrer" class="footer-instagram" aria-label="Instagram">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
      <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
      <circle cx="17.5" cy="6.5" r="1.5"></circle>
    </svg>
  </a>
  {{ end }}
  <p><a href="mailto:hello@{{ .Site.Params.domain }}" rel="noopener noreferrer">hello@{{ .Site.Params.domain }}</a></p>
</footer>
